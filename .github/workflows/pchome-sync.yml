name: Sync PChome snapshot

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'source-import-queue/**'

permissions:
  contents: write

concurrency:
  group: pchome-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Apply queued source imports
        run: node scripts/apply-source-import-queue.mjs

      - name: Refresh snapshot
        run: node scripts/sync-pchome-snapshot.mjs

      - name: Commit and push changes
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Sync PChome snapshot [skip ci]"
          git push origin HEAD:main
